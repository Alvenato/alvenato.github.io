<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados | Cristiano Alves</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; padding: 50px; text-align: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }

        /* Estética do Card */
        .flip-card { width: 280px; height: 200px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .flip-card:hover .flip-card-inner { transform: rotateY(180deg); }

        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }

        .front { background: #ffffff; color: #333; border: 1px solid #eaeaea; }
        .front h3 { font-size: 1.1rem; margin-bottom: 8px; color: #1a73e8; }
        .front p { font-size: 0.85rem; color: #555; margin: 2px 0; }

        .back { background: #1a73e8; color: white; transform: rotateY(180deg); }
        .back span { border: 2px solid #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1>Meus Certificados</h1>
    <div class="container">
        
        <div class="flip-card">
            <a href="certificado-5s.png" data-lightbox="galeria" data-title="Treinamento 5S - Americanas [cite: 14, 15]">
                <div class="flip-card-inner">
                    <div class="front">
                        <h3>Treinamento 5S</h3>
                        <p>Americanas (OCP)</p>
                        <p>13/04/2022 [cite: 15]</p>
                    </div>
                    <div class="back"><span>Visualizar</span></div>
                </div>
            </a>
        </div>

        <div class="flip-card">
            <a href="certificado-comunicacao-visual.jpg" data-lightbox="galeria" data-title="A Estratégia por trás da Comunicação Visual [cite: 24]">
                <div class="flip-card-inner">
                    <div class="front">
                        <h3>Comunicação Visual</h3>
                        <p>Universo Americanas</p>
                        <p>07/07/2021 [cite: 26]</p>
                    </div>
                    <div class="back"><span>Visualizar</span></div>
                </div>
            </a>
        </div>

        <div class="flip-card">
            <a href="certificado-alto-impacto.jpg" data-lightbox="galeria" data-title="Apresentação de Alto Impacto [cite: 32]">
                <div class="flip-card-inner">
                    <div class="front">
                        <h3>Alto Impacto</h3>
                        <p>Universo Americanas</p>
                        <p>28/05/2021 [cite: 34]</p>
                    </div>
                    <div class="back"><span>Visualizar</span></div>
                </div>
            </a>
        </div>

        <div class="flip-card">
            <a href="certificado-anticorrupcao.jpg" data-lightbox="galeria" data-title="Curso Anticorrupção [cite: 40]">
                <div class="flip-card-inner">
                    <div class="front">
                        <h3>Anticorrupção</h3>
                        <p>Americanas S.A.</p>
                        <p>01/08/2022 [cite: 41]</p>
                    </div>
                    <div class="back"><span>Visualizar</span></div>
                </div>
            </a>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
</body>
</html>
